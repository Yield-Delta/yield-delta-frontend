[toolchain]
anchor_version = "0.30.1"
solana_version = "1.18.26"

[features]
seeds = true
skip-lint = false

[programs.devnet]
yield_vault          = "PLACEHOLDER_YIELD_VAULT"
yield_vault_core     = "PLACEHOLDER_YIELD_VAULT_CORE"
yield_oracle         = "PLACEHOLDER_YIELD_ORACLE"
staking_vault        = "PLACEHOLDER_STAKING_VAULT"
lp_vault             = "PLACEHOLDER_LP_VAULT"
delta_neutral_vault  = "PLACEHOLDER_DELTA_NEUTRAL_VAULT"
meta_vault           = "PLACEHOLDER_META_VAULT"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "devnet"
wallet = "~/.config/solana/devnet-deployer.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"
