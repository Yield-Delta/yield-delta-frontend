[toolchain]
anchor_version = "0.30.1"
solana_version = "1.18.26"

[features]
seeds = true
skip-lint = false

[programs.devnet]
yield_vault = "PLACEHOLDER_PROGRAM_ID"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "devnet"
wallet = "~/.config/solana/devnet-deployer.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"
